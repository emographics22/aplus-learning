<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - A+ Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">

  <div class="bg-gray-900 p-4 sm:p-8 rounded-2xl sm:rounded-3xl shadow-2xl w-full max-w-sm">

    <p class="text-gray-400 mb-6 text-center text-sm sm:text-base">Welcome Back</p>

    <form id="loginForm">
      <input id="username" type="text" placeholder="Username"
        class="w-full p-3 mb-3 rounded bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-base">

      <div class="relative mb-4">
        <input id="password" type="password" placeholder="Password"
          class="w-full p-3 rounded bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-400 pr-12 text-base">
        <button type="button" id="togglePassword"
          class="absolute right-2 top-3 text-gray-400 hover:text-yellow-400 text-xs font-bold">
          Show
        </button>
      </div>

      <button type="submit"
        class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded transition duration-200 text-base">
        Login
      </button>
    </form>

    <!-- Guest Button -->
    <a href="dashboard.html" class="block w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded transition duration-200 text-base text-center mt-3">
      🚀 Continue as Guest
    </a>

    <p class="text-gray-400 text-xs sm:text-sm mt-4 text-center">
      Don't have an account?
      <a href="register.html" class="text-yellow-400 hover:text-yellow-300 underline font-bold">
        Register here
      </a>
    </p>

  </div>

  <!-- Separate JavaScript -->
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', (e) => {
      e.preventDefault();
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePassword.textContent = 'Hide';
      } else {
        passwordInput.type = 'password';
        togglePassword.textContent = 'Show';
      }
    });
  </script>
  <script src="login.js"></script>

</body>
</html>
