<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz - A+ Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="bg-gray-900 p-8 rounded-3xl shadow-2xl w-96">

  <h1 class="text-3xl text-yellow-400 font-bold mb-6 text-center">A+ Quiz</h1>

  <!-- Topic Selection -->
  <div id="topic-selection" class="mb-6">
    <h2 class="text-yellow-400 font-bold mb-3">Select a Topic:</h2>
    <div id="topics"></div>
  </div>

  <!-- Quiz Selection -->
  <div id="quiz-list" class="mb-6 hidden">
    <h2 class="text-yellow-400 font-bold mb-3">Select a Quiz:</h2>
    <div id="quizzes"></div>
  </div>

  <!-- Quiz Container -->
  <div id="quiz-container" class="mb-4"></div>

  <!-- Next Button -->
  <button id="next-btn" class="hidden w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 rounded mb-3 transition duration-200">Next</button>

  <!-- Score -->
  <p id="score-text" class="text-center text-gray-400"></p>

</div>

<script src="quizzes.js"></script>
<script src="quizLogic.js"></script>

</body>
</html>
